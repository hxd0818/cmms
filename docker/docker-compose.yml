# CMMS Development Infrastructure
# Fully isolated from other projects:
# - Explicit project name 'cmms' (avoids default dir-name collision)
# - Custom network 'cmms-network'
# - Bind mount to ./data/{postgres,redis} (data lives inside project, portable)
# - Distinct ports (5434/6381) to avoid conflict with other projects
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#   docker compose -f docker/docker-compose.yml down
#   docker compose -f docker/docker-compose.yml logs -f postgres

name: cmms

services:
  postgres:
    image: postgres:16-alpine
    container_name: cmms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cmms
      POSTGRES_PASSWORD: cmms_dev_password
      POSTGRES_DB: cmms
    ports:
      - '5434:5432'
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - cmms-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cmms -d cmms']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cmms-redis
    restart: unless-stopped
    ports:
      - '6381:6379'
    volumes:
      - ./data/redis:/data
    networks:
      - cmms-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  cmms-network:
    name: cmms-network
    driver: bridge
